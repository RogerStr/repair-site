<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reparaturverwaltung</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<h1>Reparaturen erfassen</h1>

<form id="repairForm">
    <label>Datum (TT.MM.JJJJ):</label>
    <input type="text" id="createdDate" /><br />

    <label>Name des Erfassers:</label>
    <input type="text" id="creatorName" required /><br />

    <label>Gerätename:</label>
    <input type="text" id="deviceName" required /><br />

    <label>Beschreibung:</label>
    <textarea id="description" required></textarea><br />

    <label>Fotos:</label>
    <div id="photosPreview" style="display:flex;flex-wrap:wrap;gap:4px;margin:4px 0"></div>
    <label id="photosAddBtn" style="display:inline-block;cursor:pointer;padding:4px 10px;background:#4CAF50;color:#fff;border-radius:4px;font-size:13px">
        + Fotos auswählen
        <input type="file" id="photosInput" accept="image/*" multiple style="display:none" />
    </label><br />

    <button type="submit">Speichern</button>
</form>

<h2>Offene Reparaturen</h2>
<table id="openRepairsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th style="width:40px">Datum</th>
        <th style="width:60px">Erfasser</th>
        <th style="width:100px">Gerät</th>
        <th>Beschreibung</th>
        <th style="width:20px">Fotos</th>
        <th style="width:1%;white-space:nowrap">Reparaturdatum</th>
        <th style="width:1%;white-space:nowrap">Repariert von</th>
        <th>Was wurde gemacht</th>
        <th>Erledigt</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Erledigte Reparaturen</h2>
<table id="doneRepairsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Datum</th>
        <th>Erfasser</th>
        <th>Gerät</th>
        <th>Beschreibung</th>
        <th>Fotos</th>
        <th>Reparaturdatum</th>
        <th>Repariert von</th>
        <th>Was wurde gemacht</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
