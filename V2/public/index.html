<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reparaturverwaltung</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<h1>Reparaturen erfassen</h1>
<form id="repairForm">
    <label>Datum (TT.MM.JJJJ):</label>
    <input type="text" id="createdDate" required /><br />

    <label>Name des Erfassers:</label>
    <input type="text" id="creatorName" required /><br />

    <label>Gerätename:</label>
    <input type="text" id="deviceName" required /><br />

    <label>Beschreibung:</label>
    <textarea id="description" required></textarea><br />

    <button type="submit">Speichern</button>
</form>

<h2>Offene Reparaturen</h2>
<table id="openRepairsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Datum</th>
        <th>Erfasser</th>
        <th>Gerät</th>
        <th>Beschreibung</th>
        <th>Reparaturdatum</th>
        <th>Repariert von</th>
        <th>Was wurde gemacht</th>
        <th>Erledigt</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Erledigte Reparaturen</h2>
<table id="doneRepairsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Datum</th>
        <th>Erfasser</th>
        <th>Gerät</th>
        <th>Beschreibung</th>
        <th>Reparaturdatum</th>
        <th>Repariert von</th>
        <th>Was wurde gemacht</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
